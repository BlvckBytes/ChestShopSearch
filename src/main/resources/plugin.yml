name: ChestShopExtensions
version: ${project.version}
author: BlvckBytes
main: at.blvckbytes.chestshop_extensions.ChestShopExtensionsPlugin
api-version: 1.21
depend: [WorldGuard, ChestShop, ItemPredicateParser]
softdepend: [floodgate]
commands:
  shopsearch:
    description: 'Search through all known shops'
  shopsearchtoggle:
    description: 'Toggle whether your current region participates in the global search'
  shopoverview:
    description: 'Browse through shops grouped by their owners'
  shopsearchreload:
    description: 'Reload the configuration-file of this plugin'
    permission: 'chestshopextensions.reload'
  buy:
    description: 'Buy a specified amount from the currently looked-at shop-sign'
  sell:
    description: 'Sell a specified amount to the currently looked-at shop-sign'
  shopiteminfo:
    description: 'Opens an item-preview of the currently looked-at shop-sign'
permissions:
  chestshopextensions.transaction-undo:
    description: 'Allows to undo transactions within a configurable time-window'
  chestshopextensions.toggle.bypass:
    description: 'Allows to bypass having to be the owner of a region to toggle advertising in the shop-search'
